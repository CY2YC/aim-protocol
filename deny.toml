# cargo-deny configuration

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Deny certain advisory categories
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]

[[licenses.exceptions]]
name = "ring"
version = "*"
allow = ["ISC", "OpenSSL"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
github = ["rustcrypto", "libp2p"]

[bans]
# Ban certain crates with security issues
multiple-versions = "warn"
wildcards = "allow"

[[bans.deny]]
name = "openssl"
# Use rustls instead

[[bans.deny]]
name = "serde_yaml"
# Use serde_yml or toml instead
