name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check code formatting and linting
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Run cargo-deny
      uses: EmbarkStudios/cargo-deny-action@v1
      with:
        command: check

  # Run tests on multiple platforms
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, nightly]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust (${{ matrix.rust }})
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
    
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev pkg-config libelf-dev
    
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install openssl pkg-config
    
    - name: Build (Linux with all features)
      if: matrix.os == 'ubuntu-latest'
      run: cargo build --all-features --verbose
    
    - name: Build (macOS without XDP)
      if: matrix.os == 'macos-latest'
      run: cargo build --verbose
      env:
        RUSTFLAGS: "--cfg skip_xdp"
    
    - name: Run tests (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cargo test --all-features --verbose
    
    - name: Run tests (macOS)
      if: matrix.os == 'macos-latest'
      run: cargo test --verbose
    
    - name: Run doc tests (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cargo test --doc --all-features
    
    - name: Run doc tests (macOS)
      if: matrix.os == 'macos-latest'
      run: cargo test --doc

  # Security audit
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run cargo-audit
      uses: actions-rust-lang/audit@v1
      with:
        file: Cargo.lock

  # Build release artifacts
  build-release:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always() && (needs.lint.result == 'success') && (needs.test.result == 'success')
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev pkg-config libelf-dev
    
    - name: Build release
      run: cargo build --release --all-features
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aim-cli
        path: target/release/aim

  # eBPF build check (requires special toolchain)
  ebpf-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    
    - name: Install bpf-linker
      run: cargo install bpf-linker
    
    - name: Check eBPF compilation
      working-directory: packages/xdp-firewall-ebpf
      run: cargo +nightly check -Z build-std=core --target bpfel-unknown-none
      continue-on-error: true  # Allow this to fail until eBPF package is fully configured
