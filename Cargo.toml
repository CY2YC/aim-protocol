[workspace]
members = [
    "packages/core",
    "packages/mesh",
    "packages/cli",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"

[profile.bench]
inherits = "release"

[workspace.dependencies]
rand = { version = "0.8", features = ["std"] }
sha2 = "0.10"
hkdf = "0.12"
ring = "0.17.0"
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
libbpf-cargo = "0.22"
blake3 = "1.5"
merkle-tree-stream = "0.10"
bloomfilter = "1.0"
