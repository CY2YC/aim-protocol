[package]
name = "aim-xdp"
version = "0.1.0"
edition = "2021"

[dependencies]
aya-ebpf = { git = "https://github.com/aya-rs/aya" }
aya-ebpf-bindings = { git = "https://github.com/aya-rs/aya" }
aya-log-ebpf = { git = "https://github.com/aya-rs/aya" }

memoffset = "0.9"

[profile.dev]
opt-level = 3
overflow-checks = false
lto = true
panic = "abort"

[profile.release]
panic = "abort"

[[bin]]
name = "aim-xdp"
path = "src/main.rs"

