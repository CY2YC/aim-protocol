[package]
name = "aim-cli"
version = "0.1.0"
edition = "2021"
authors = ["AIM Protocol Contributors"]
license = "MIT OR Apache-2.0"
description = "CLI tool for AIM Protocol"

[[bin]]
name = "aim"
path = "src/main.rs"

[dependencies]
aim-core = { path = "../core" }
aim-mesh = { path = "../mesh" }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
