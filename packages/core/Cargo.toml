[package]
name = "aim-core"
version = "0.1.0"
edition = "2021"
authors = ["AIM Protocol Contributors"]
license = "MIT OR Apache-2.0"
description = "Core cryptographic primitives and identity management for AIM Protocol"

[features]
default = ["std"]
std = ["ml-kem/std", "ml-dsa/std", "serde/std", "rand/std", "rand/std_rng"]
no_std = ["serde/alloc"]

[dependencies]
# NIST PQC - FIPS 203/204 compliant
ml-kem = { workspace = true }
ml-dsa = { workspace = true, features = ["default"] }

# Cryptographic utilities
sha2 = { workspace = true, default-features = false }
hkdf = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }
rand_core = { workspace = true }

# X25519 for hybrid
x25519-dalek = { version = "2.0", default-features = false, features = ["static_secrets", "getrandom"] }

# Serialization
serde = { workspace = true, default-features = false, features = ["derive"] }
serde_bytes = { workspace = true, default-features = false, features = ["alloc"] }
postcard = { workspace = true }

# Security
zeroize = { workspace = true, features = ["derive"] }
constant_time_eq = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Hex encoding/decoding
hex = { workspace = true }

# Revocation - Sparse Merkle Tree + Bloom filter
monotree = { workspace = true, default-features = false }
bloomfilter = { workspace = true, default-features = false }

# Secret sharing - using shamir-vault for no_std support
shamir-vault = { version = "1.2", default-features = false }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }
rand = { workspace = true, features = ["std_rng"] }
