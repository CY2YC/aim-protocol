# Rustfmt configuration for AIM Protocol

edition = "2021"
version = "Two"

# Formatting rules
max_width = 100
chain_width = 80
fn_call_width = 80
struct_lit_width = 50
array_width = 80

# Style
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true

# Comments
wrap_comments = true
comment_width = 80

# Imports
imports_granularity = "Crate"
group_imports = "StdExternalCrate"

# Other
format_code_in_doc_comments = true
format_strings = true
format_macro_matchers = true
